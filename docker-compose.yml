services:
  ml-dev:
    build: .
    volumes:
      - ./src:/app/src
      - ./data:/app/data
      - ./models:/app/models
      - ./notebooks:/app/notebooks
    environment:
      - PYTHONUNBUFFERED=1

  ml-inference:
    build: .
    environment:
      - PYTHONUNBUFFERED=1
    profiles:
      - inference
